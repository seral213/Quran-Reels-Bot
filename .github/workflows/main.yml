name: Auto Quran Reels Studio

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 سحب الملفات
      uses: actions/checkout@v3

    - name: 🐍 تجهيز لغة بايثون
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 🛠️ إصلاح سياسات ImageMagick (للكتابة على الفيديو)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        # هذا السطر يخترق حماية السيرفر ويسمح بكتابة النصوص
        sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

    - name: ⚙️ تثبيت المكتبات الأساسية
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install yt-dlp faster-whisper moviepy instagrapi arabic-reshaper python-bidi Pillow numpy requests

    - name: 🎬 تشغيل استوديو المونتاج والنشر
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        IG_USERNAME: ${{ secrets.IG_USERNAME }}
        IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        ERROR_BOT_TOKEN: ${{ secrets.ERROR_BOT_TOKEN }}
        ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python bot.py

    - name: 🔐 حفظ الذاكرة وجلسة إنستجرام الآمنة
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add session.json
        git commit -m "تحديث جلسة إنستجرام الآمنة 🔒" || echo "لا توجد تغييرات في الجلسة"
        git push
