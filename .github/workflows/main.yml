name: Quran Reels Auto Publisher

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: سحب الملفات
      uses: actions/checkout@v3

    - name: تجهيز لغة بايثون
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: تثبيت مكتبات المونتاج
      run: |
        sudo apt-get update
        sudo apt-get install ffmpeg imagemagick -y
        sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

    - name: تثبيت مكتبات بايثون
      run: pip install -r requirements.txt

    - name: تشغيل النفق المعزول (SOCKS5 Proxy) لكسر الحظر
      run: |
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install cloudflare-warp -y
        sudo systemctl start warp-svc
        sleep 2
        warp-cli --accept-tos registration new || warp-cli --accept-tos register
        warp-cli --accept-tos mode proxy || warp-cli --accept-tos set-mode proxy
        warp-cli --accept-tos connect
        sleep 5

    - name: تشغيل استوديو المونتاج والنشر
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        INSTA_TOKEN: ${{ secrets.INSTA_TOKEN }}
        ERROR_BOT_TOKEN: ${{ secrets.ERROR_BOT_TOKEN }}
        ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
      run: python bot.py

    - name: حفظ الذاكرة
      run: |
        git config --global user.name "QuranBot"
        git config --global user.email "bot@example.com"
        git add history.json
        git commit -m "تحديث الذاكرة اليومية" || echo "لا يوجد تحديث جديد"
        git push
